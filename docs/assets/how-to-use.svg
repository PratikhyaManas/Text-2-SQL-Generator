<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Text2SQL Quick Walkthrough</title>
  <desc id="desc">A four-step visual guide for running the API and Streamlit app, asking a question, approving SQL, and downloading CSV.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { fill: #132a4a; font: 700 34px 'Segoe UI', sans-serif; }
      .subtitle { fill: #355175; font: 500 18px 'Segoe UI', sans-serif; }
      .card { fill: #ffffff; stroke: #d6deea; stroke-width: 2; rx: 16; }
      .step { fill: #0d4c92; font: 700 18px 'Segoe UI', sans-serif; }
      .head { fill: #132a4a; font: 700 20px 'Segoe UI', sans-serif; }
      .text { fill: #2c4768; font: 500 15px 'Segoe UI', sans-serif; }
      .chip { fill: #e7f0ff; stroke: #b7cff5; stroke-width: 1.5; rx: 8; }
      .chipText { fill: #224a7d; font: 600 13px 'Consolas', monospace; }
      .arrow { stroke: #8aa9d6; stroke-width: 3; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#8aa9d6" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="460" />
  <text class="title" x="40" y="56">How To Use The App In 4 Steps</text>
  <text class="subtitle" x="40" y="86">FastAPI security pipeline + Streamlit UX (approval, EXPLAIN warnings, CSV export)</text>

  <rect class="card" x="40" y="120" width="265" height="280" />
  <text class="step" x="60" y="155">STEP 1</text>
  <text class="head" x="60" y="185">Start Services</text>
  <text class="text" x="60" y="215">Launch API + Streamlit together</text>
  <rect class="chip" x="60" y="238" width="225" height="36" />
  <text class="chipText" x="70" y="261">poetry run start-dev</text>
  <text class="text" x="60" y="295">Open Streamlit in browser and</text>
  <text class="text" x="60" y="317">select user + database.</text>

  <rect class="card" x="330" y="120" width="265" height="280" />
  <text class="step" x="350" y="155">STEP 2</text>
  <text class="head" x="350" y="185">Ask Question</text>
  <text class="text" x="350" y="215">Enter natural language prompt</text>
  <text class="text" x="350" y="237">in Streamlit and click Run Query.</text>
  <text class="text" x="350" y="270">You will see progress stages:</text>
  <text class="text" x="350" y="292">generating, validating,</text>
  <text class="text" x="350" y="314">executing, formatting.</text>

  <rect class="card" x="620" y="120" width="265" height="280" />
  <text class="step" x="640" y="155">STEP 3</text>
  <text class="head" x="640" y="185">Review & Approve</text>
  <text class="text" x="640" y="215">Preview safe SQL before execution.</text>
  <text class="text" x="640" y="237">Check EXPLAIN plan warnings.</text>
  <rect class="chip" x="640" y="260" width="225" height="36" />
  <text class="chipText" x="650" y="283">POST /query/preview</text>
  <text class="text" x="640" y="317">Approve and execute exact SQL.</text>

  <rect class="card" x="910" y="120" width="250" height="280" />
  <text class="step" x="930" y="155">STEP 4</text>
  <text class="head" x="930" y="185">Save & Export</text>
  <text class="text" x="930" y="215">Save reusable prompts from UI.</text>
  <text class="text" x="930" y="237">Download result as CSV file.</text>
  <text class="text" x="930" y="270">History and schema stay visible</text>
  <text class="text" x="930" y="292">for quick iteration.</text>

  <path class="arrow" d="M305 260 L325 260" />
  <path class="arrow" d="M595 260 L615 260" />
  <path class="arrow" d="M885 260 L905 260" />
</svg>
