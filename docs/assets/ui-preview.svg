<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">Streamlit UI Preview</title>
  <desc id="desc">Preview of the Text2SQL Streamlit interface including sidebar controls, query editor, SQL preview, execution warnings, and results table.</desc>
  <defs>
    <style>
      .bg { fill: #eef3fb; }
      .shell { fill: #ffffff; stroke: #d1dceb; stroke-width: 2; rx: 16; }
      .side { fill: #f8fbff; stroke: #d9e4f2; stroke-width: 1.5; }
      .main { fill: #ffffff; }
      .h1 { fill: #123a68; font: 700 34px 'Segoe UI', sans-serif; }
      .h2 { fill: #1f4e7f; font: 700 18px 'Segoe UI', sans-serif; }
      .txt { fill: #35567a; font: 500 14px 'Segoe UI', sans-serif; }
      .mono { fill: #20466f; font: 600 12px 'Consolas', monospace; }
      .input { fill: #ffffff; stroke: #c7d6ea; stroke-width: 1.5; rx: 8; }
      .btnPrimary { fill: #2f74d0; rx: 8; }
      .btnText { fill: #ffffff; font: 700 13px 'Segoe UI', sans-serif; }
      .card { fill: #f9fcff; stroke: #d7e4f5; stroke-width: 1.5; rx: 10; }
      .warn { fill: #fff7ea; stroke: #f0c978; stroke-width: 1.5; rx: 8; }
      .ok { fill: #edf8f0; stroke: #93d3a4; stroke-width: 1.5; rx: 8; }
      .tableHeader { fill: #eef5ff; }
      .tableRow { fill: #ffffff; }
      .tableLine { stroke: #d8e5f5; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="860" />
  <rect class="shell" x="30" y="24" width="1340" height="812" />

  <rect class="side" x="56" y="58" width="300" height="744" />
  <text class="h2" x="78" y="96">Connection</text>
  <text class="txt" x="78" y="122">API base URL</text>
  <rect class="input" x="78" y="132" width="256" height="34" />
  <text class="mono" x="88" y="154">http://localhost:8000</text>

  <text class="txt" x="78" y="188">User ID</text>
  <rect class="input" x="78" y="198" width="256" height="34" />
  <text class="mono" x="88" y="220">demo</text>

  <text class="txt" x="78" y="254">Require query approval</text>
  <rect class="input" x="78" y="264" width="256" height="30" />
  <text class="mono" x="88" y="284">ON</text>

  <text class="h2" x="78" y="332">Saved Queries</text>
  <rect class="input" x="78" y="346" width="256" height="34" />
  <text class="mono" x="88" y="368">top-products-report</text>
  <rect class="btnPrimary" x="78" y="390" width="124" height="34" />
  <text class="btnText" x="106" y="412">Load query</text>

  <text class="h2" x="78" y="462">Schema</text>
  <rect class="btnPrimary" x="78" y="478" width="140" height="34" />
  <text class="btnText" x="100" y="500">Refresh schema</text>

  <rect class="main" x="386" y="58" width="958" height="744" />
  <text class="h1" x="412" y="102">Secure Text-to-SQL</text>
  <text class="txt" x="412" y="128">Standalone Streamlit frontend with preview, approval, explain warnings, and CSV export.</text>

  <text class="h2" x="412" y="168">Question</text>
  <rect class="input" x="412" y="178" width="904" height="84" />
  <text class="txt" x="428" y="210">top 3 products by quantity sold</text>

  <rect class="btnPrimary" x="412" y="278" width="140" height="36" />
  <text class="btnText" x="446" y="301">Run Query</text>
  <rect class="btnPrimary" x="566" y="278" width="182" height="36" />
  <text class="btnText" x="590" y="301">Approve & Execute</text>
  <rect class="btnPrimary" x="762" y="278" width="180" height="36" />
  <text class="btnText" x="792" y="301">Download CSV</text>

  <rect class="card" x="412" y="332" width="440" height="150" />
  <text class="h2" x="430" y="360">SQL Preview</text>
  <text class="mono" x="430" y="386">SELECT p.name, SUM(oi.quantity) AS total_sold</text>
  <text class="mono" x="430" y="404">FROM order_items oi JOIN products p ON ...</text>
  <text class="mono" x="430" y="422">GROUP BY p.name ORDER BY total_sold DESC LIMIT 5</text>

  <rect class="warn" x="868" y="332" width="448" height="66" />
  <text class="h2" x="886" y="358">EXPLAIN warning</text>
  <text class="txt" x="886" y="380">Query plan indicates a table scan without index usage.</text>

  <rect class="ok" x="868" y="416" width="448" height="66" />
  <text class="h2" x="886" y="442">Execution Status</text>
  <text class="txt" x="886" y="464">Success. Returned 5 row(s) with columns name, total_sold.</text>

  <rect class="card" x="412" y="504" width="904" height="278" />
  <text class="h2" x="430" y="532">Result</text>
  <rect class="tableHeader" x="430" y="548" width="868" height="36" />
  <line class="tableLine" x1="430" y1="584" x2="1298" y2="584" />
  <line class="tableLine" x1="430" y1="620" x2="1298" y2="620" />
  <line class="tableLine" x1="430" y1="656" x2="1298" y2="656" />
  <line class="tableLine" x1="430" y1="692" x2="1298" y2="692" />
  <line class="tableLine" x1="900" y1="548" x2="900" y2="764" />

  <text class="h2" x="450" y="572">name</text>
  <text class="h2" x="920" y="572">total_sold</text>

  <text class="txt" x="450" y="607">Notebook</text>
  <text class="txt" x="920" y="607">5</text>

  <text class="txt" x="450" y="643">Wireless Mouse</text>
  <text class="txt" x="920" y="643">3</text>

  <text class="txt" x="450" y="679">USB-C Hub</text>
  <text class="txt" x="920" y="679">2</text>

  <text class="txt" x="450" y="715">Mechanical Keyboard</text>
  <text class="txt" x="920" y="715">2</text>

  <text class="txt" x="450" y="751">Desk Lamp</text>
  <text class="txt" x="920" y="751">2</text>
</svg>
